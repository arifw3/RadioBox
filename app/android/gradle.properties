# -Xmx8G (the flutter create default) exceeds physical RAM on this 7GB
# dev machine and crashed the Gradle daemon with an OOM. Keep this well
# under total system RAM.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=256m
android.useAndroidX=true

# The pub cache lives on C: while this project lives on D: — the Kotlin
# incremental compiler crashes trying to compute a relative path between
# them ("this and base files have different roots") when persisting its
# cache, which takes the whole Gradle daemon down with it. Full (non-
# incremental) Kotlin compilation is slower but avoids that cache entirely.
kotlin.incremental=false
